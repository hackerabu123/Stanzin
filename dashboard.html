<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASURA V6 | PRO MAX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --p: #d8b4fe; --bg: #010103; --neon: #a855f7; --win: #22c55e; --loss: #ef4444; }
        body { 
            background: var(--bg); color: #fff; font-family: 'Roboto', sans-serif;
            background-image: radial-gradient(circle at 50% 0%, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
            min-height: 100vh; overflow-x: hidden;
        }
        .classic-bold { font-family: 'Roboto', sans-serif; font-weight: 900; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        .glass { background: rgba(15, 15, 25, 0.9); backdrop-filter: blur(30px); border: 1px solid rgba(168, 85, 247, 0.25); border-radius: 35px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
        
        /* Advanced Progress Circles */
        .circle-box { position: relative; width: 85px; height: 85px; filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.2)); }
        svg.prog-ring { transform: rotate(-90deg); width: 85px; height: 85px; }
        circle.bg { fill: none; stroke: rgba(255,255,255,0.03); stroke-width: 8; }
        circle.val { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 1.2s cubic-bezier(0.34, 1.56, 0.64, 1); }

        .tab-btn.active { background: var(--neon); color: #000; font-weight: 900; box-shadow: 0 0 25px var(--neon); }
        
        /* Prediction Text Glow */
        #pred-val { text-shadow: 0 0 20px rgba(168, 85, 247, 0.5); }
        
        .status-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #toast { visibility: hidden; background: #fff; color: #000; padding: 14px 30px; border-radius: 50px; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; font-weight: 900; box-shadow: 0 0 30px var(--neon); }
        #toast.show { visibility: visible; animation: slideDown 0.4s forwards; }
        @keyframes slideDown { from { top: -60px; } to { top: 30px; } }
    </style>
</head>
<body class="max-w-md mx-auto p-5 pb-10">

    <div id="toast">QUANT SIGNAL COPIED ⚡</div>

    <header class="flex justify-between items-center mb-10">
        <div>
            <h1 class="orbitron text-3xl font-black text-white italic tracking-tighter">ASURA <span class="text-purple-500">V6</span></h1>
            <div class="flex items-center gap-2">
                <span class="h-1.5 w-1.5 rounded-full bg-green-500 status-pulse"></span>
                <p class="text-[8px] text-purple-400 font-black tracking-[0.4em] uppercase">Pro-Max Quant Engine</p>
            </div>
        </div>
        <div class="glass px-4 py-2 flex items-center gap-2 border-purple-500/40">
            <i class="fa-solid fa-microchip text-purple-400"></i>
            <span id="timer" class="classic-bold text-sm">00:00</span>
        </div>
    </header>

    <div class="glass p-8 mb-8 relative">
        <div class="flex justify-between items-center mb-8">
            <div class="flex items-center">
                <i class="fa-solid fa-fingerprint text-purple-500 mr-3 text-xl"></i>
                <span id="period-val" class="classic-bold text-2xl text-white tracking-widest">-----</span>
            </div>
            <div class="text-right">
                <p class="text-[7px] font-black text-slate-500 tracking-[0.2em] mb-1 uppercase">Pattern Risk</p>
                <span id="risk-lvl" class="text-[9px] font-black text-green-400">LOW RISK</span>
            </div>
        </div>

        <div class="text-center py-10 bg-gradient-to-b from-purple-500/10 to-transparent rounded-[50px] border border-white/5 mb-8">
            <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.5em] mb-4">Final Prediction</p>
            <h3 id="pred-val" class="orbitron text-7xl font-black text-white">--</h3>
        </div>

        <div class="space-y-4">
            <div class="flex justify-between text-[10px] font-black text-slate-400 uppercase tracking-widest">
                <span>Quant Accuracy</span>
                <span id="prob-val" class="text-purple-400">0%</span>
            </div>
            <div class="h-2.5 w-full bg-white/5 rounded-full p-0.5 border border-white/5">
                <div id="prob-bar" class="h-full bg-gradient-to-r from-purple-800 to-purple-400 rounded-full transition-all duration-1000 shadow-[0_0_10px_#a855f7]" style="width: 0%"></div>
            </div>
        </div>

        <button onclick="copyDash()" class="w-full mt-8 py-4 bg-white/5 hover:bg-white/10 rounded-2xl border border-white/10 transition-all flex items-center justify-center gap-3">
            <i class="fa-solid fa-copy text-purple-400"></i>
            <span class="classic-bold text-xs uppercase tracking-widest">Copy Intelligence</span>
        </button>
    </div>

    <div class="flex justify-around items-center mb-10 glass py-10 border-none bg-white/5">
        <div class="text-center">
            <div class="circle-box mx-auto">
                <svg class="prog-ring"><circle class="bg" cx="42.5" cy="42.5" r="38"/><circle id="circ-win" class="val" stroke="var(--win)" stroke-dasharray="238.7" stroke-dashoffset="238.7" cx="42.5" cy="42.5" r="38"/></svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="txt-win" class="classic-bold text-2xl text-green-500">0</span>
                </div>
            </div>
            <p class="text-[10px] font-black mt-4 text-slate-500 uppercase tracking-widest">Wins</p>
        </div>

        <div class="text-center">
            <div class="circle-box mx-auto">
                <svg class="prog-ring"><circle class="bg" cx="42.5" cy="42.5" r="38"/><circle id="circ-loss" class="val" stroke="var(--loss)" stroke-dasharray="238.7" stroke-dashoffset="238.7" cx="42.5" cy="42.5" r="38"/></svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="txt-loss" class="classic-bold text-2xl text-red-500">0</span>
                </div>
            </div>
            <p class="text-[10px] font-black mt-4 text-slate-500 uppercase tracking-widest">Losses</p>
        </div>
    </div>

    <div class="flex gap-3 mb-6 p-2 bg-white/5 rounded-[25px]">
        <button onclick="tab('h')" id="bt-h" class="tab-btn active flex-1 py-4 rounded-2xl text-[11px] classic-bold uppercase tracking-widest">System Logs</button>
        <button onclick="tab('g')" id="bt-g" class="tab-btn flex-1 py-4 rounded-2xl text-[11px] classic-bold uppercase tracking-widest text-slate-600">Feed</button>
    </div>

    <div id="vh" class="space-y-4 max-h-[450px] overflow-y-auto pr-2 custom-scroll"></div>
    <div id="vg" class="hidden space-y-4 max-h-[450px] overflow-y-auto pr-2 custom-scroll"></div>

    <script>
        let wins = 0, loss = 0, total = 0, logs = [];

        function tab(x) {
            document.getElementById('vh').style.display = x === 'h' ? 'block' : 'none';
            document.getElementById('vg').style.display = x === 'g' ? 'block' : 'none';
            document.getElementById('bt-h').classList.toggle('active', x === 'h');
            document.getElementById('bt-g').classList.toggle('active', x === 'g');
        }

        // ==========================================
        // PRO-MAX QUANT LOGIC ENGINE
        // ==========================================
        function calculateProMax(history) {
            if (!history || history.length < 30) return { side: "B", conf: 50, risk: "HIGH" };
            
            const raw = history.map(h => parseInt(h.number)).reverse();
            const types = raw.map(n => n > 4 ? 1 : 0); // 1=BIG, 0=SMALL
            let score = 0;

            // 1. Exponential Moving Average (EMA) - Trending
            let ema = types[0];
            const k = 2 / (10 + 1);
            for(let i=1; i<types.length; i++) ema = types[i] * k + ema * (1 - k);
            score += (ema < 0.45) ? 2.5 : (ema > 0.55) ? -2.5 : 0;

            // 2. Standard Deviation (Volatility Check)
            let last15 = types.slice(-15);
            let avg = last15.reduce((a,b) => a+b)/15;
            let variance = last15.reduce((a,b) => a + Math.pow(b-avg, 2), 0) / 15;
            let stdDev = Math.sqrt(variance);
            
            // 3. Advanced Markov (3-State Memory)
            let currentPath = types.slice(-3).join("");
            let counts = {B:0, S:0};
            for(let i=3; i<types.length; i++) {
                if(types.slice(i-3, i).join("") === currentPath) {
                    types[i] === 1 ? counts.B++ : counts.S++;
                }
            }
            score += (counts.S > counts.B) ? 2.0 : -2.0;

            // 4. Mean Reversion (Overbought/Oversold)
            let streak = 0, last = types[types.length-1];
            for(let i=types.length-1; i>=0; i--) {
                if(types[i] === last) streak++; else break;
            }
            if(streak >= 5) score += (last === 1) ? 3.5 : -3.5;

            // Final Calculation
            let probS = 1 / (1 + Math.exp(-score));
            let finalSide = (probS > 0.5) ? "S" : "B";
            let conf = 80 + (Math.abs(probS - 0.5) * 38);

            return { 
                side: finalSide, 
                conf: Math.min(conf, 99.8),
                risk: stdDev > 0.48 ? "HIGH VOLATILITY" : "STABLE MARKET"
            };
        }

        async function sync() {
            try {
                const res = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
                const data = await res.json();
                const list = data.data.list;
                const last = list[0];
                const nextId = (BigInt(last.issueNumber) + 1n).toString();

                document.getElementById('period-val').innerText = nextId.slice(-5);

                if(window.cur && window.cur.id === last.issueNumber) {
                    const actual = parseInt(last.number) > 4 ? "B" : "S";
                    const isW = window.cur.side === actual;
                    isW ? wins++ : loss++;
                    total++;
                    if(logs[0]) logs[0].status = isW ? 'WIN' : 'LOSS';
                    updateStats();
                    renderH();
                }

                if(!window.cur || window.cur.id !== nextId) {
                    const quant = calculateProMax(list);
                    window.cur = { id: nextId, side: quant.side };
                    document.getElementById('pred-val').innerText = quant.side === "B" ? "BIG" : "SMALL";
                    document.getElementById('prob-val').innerText = quant.conf.toFixed(1) + "%";
                    document.getElementById('prob-bar').style.width = quant.conf + "%";
                    document.getElementById('risk-lvl').innerText = quant.risk;
                    document.getElementById('risk-lvl').className = `text-[9px] font-black ${quant.risk === 'STABLE MARKET' ? 'text-green-400' : 'text-yellow-500'}`;
                    
                    logs.unshift({ id: nextId, side: quant.side, status: 'PENDING' });
                    renderH();
                }
                renderG(list);
            } catch (e) {}
        }

        function updateStats() {
            const circ = 238.7;
            const wRate = wins / Math.max(total, 1);
            const lRate = loss / Math.max(total, 1);
            document.getElementById('circ-win').style.strokeDashoffset = circ - (wRate * circ);
            document.getElementById('circ-loss').style.strokeDashoffset = circ - (lRate * circ);
            document.getElementById('txt-win').innerText = wins;
            document.getElementById('txt-loss').innerText = loss;
        }

        function renderH() {
            document.getElementById('vh').innerHTML = logs.slice(0, 15).map(l => `
                <div class="glass p-5 flex justify-between items-center border-l-4 ${l.status==='WIN'?'border-green-500 bg-green-500/5':l.status==='LOSS'?'border-red-500 bg-red-500/5':'border-purple-600 bg-purple-500/5'}">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-shield-halved text-purple-500 text-xs"></i>
                        <div>
                            <span class="classic-bold text-sm text-white">#${l.id.slice(-5)}</span>
                            <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest">${l.side === "B" ? "BIG" : "SMALL"}</p>
                        </div>
                    </div>
                    <span class="text-[10px] font-black ${l.status==='WIN'?'text-green-500':l.status==='LOSS'?'text-red-500':'text-purple-400'}">${l.status}</span>
                </div>
            `).join('');
        }

        function renderG(list) {
            document.getElementById('vg').innerHTML = list.slice(0, 15).map(i => `
                <div class="glass p-5 flex justify-between items-center border-none bg-white/5">
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-database text-slate-600 text-[10px]"></i>
                        <span class="classic-bold text-sm text-slate-400">#${i.issueNumber.slice(-5)}</span>
                    </div>
                    <div class="flex items-center gap-5">
                        <span class="text-[9px] font-black text-slate-500 uppercase">${parseInt(i.number)>4?'BIG':'SMALL'}</span>
                        <span class="bg-white text-black px-3 py-1 rounded classic-bold text-xs">${i.number}</span>
                    </div>
                </div>
            `).join('');
        }

        function copyDash() {
            if(!window.cur) return;
            const t = `ASURA PRO-MAX\nPERIOD: ${window.cur.id}\nSIGNAL: ${window.cur.side === "B" ? "BIG" : "SMALL"}\nCONFIDENCE: ${document.getElementById('prob-val').innerText}\nOWNER: @madarabhai98`;
            navigator.clipboard.writeText(t);
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => toast.className = toast.className.replace("show", ""), 2000);
        }

        setInterval(() => {
            const r = 60 - new Date().getSeconds();
            document.getElementById('timer').innerText = `00:${r < 10 ? '0'+r : r}`;
            if(r === 59 || r === 30) sync();
        }, 1000);
        sync();
    </script>
</body>
</html>
