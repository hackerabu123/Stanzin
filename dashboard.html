<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAI CLUB VIP - RESTORED</title>
    <style>
        :root {
            --lp-main: #d8b4fe;
            --lp-glow: #c68ef9;
            --recovery-border: #ff0055;
            --panel-bg: rgba(10, 5, 20, 0.98);
            --bubbly-font: 'Varela Round', sans-serif;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: var(--bubbly-font); }
        #game-frame { width: 100%; height: 100%; border: none; position: absolute; }

        /* --- RESTORE COMPACT DIMENSIONS --- */
        #mainPanel {
            position: fixed; top: 85px; left: 10px; width: 195px;
            background: var(--panel-bg); border: 1.5px solid var(--lp-main);
            border-radius: 20px; padding: 12px; z-index: 9999;
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
            backdrop-filter: blur(12px); touch-action: none;
            display: flex; flex-direction: column; gap: 8px; transition: 0.3s;
        }

        /* --- RESTORE 3D CUBE TOGGLE --- */
        #cubeContainer {
            position: fixed; top: 85px; left: 10px; width: 45px; height: 45px;
            z-index: 10000; display: none; perspective: 1000px;
        }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: rotateCube 8s infinite linear; }
        .cube-face {
            position: absolute; width: 42px; height: 42px; border: 1.5px solid var(--lp-main);
            background-size: cover; background-position: center;
            box-shadow: inset 0 0 15px var(--lp-glow), 0 0 10px var(--lp-glow); opacity: 0.9;
        }
        .front { transform: translateZ(21px); } .back { transform: rotateY(180deg) translateZ(21px); }
        .right { transform: rotateY(90deg) translateZ(21px); } .left { transform: rotateY(-90deg) translateZ(21px); }
        .top { transform: rotateX(90deg) translateZ(21px); } .bottom { transform: rotateX(-90deg) translateZ(21px); }
        @keyframes rotateCube { from { transform: rotateX(0deg) rotateY(0deg); } to { transform: rotateX(360deg) rotateY(360deg); } }

        /* --- RESTORE GOLDEN TITLE FIXED --- */
        .header { 
            font-size: 11px; font-weight: 900; color: #fbbf24; /* Golden */
            text-align: center; letter-spacing: 1.5px;
            text-shadow: 0 0 10px #fbbf24;
        }
        
        /* --- RESTORE BOLD WHITE PERIOD --- */
        .period-no { 
            font-size: 14px; color: #ffffff; font-weight: 900; 
            text-align: center; background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px; padding: 6px; border: 1px solid rgba(216, 180, 254, 0.2);
            letter-spacing: 0.5px;
        }

        /* --- RESTORE RESULT AREA --- */
        .result-area { 
            display: flex; align-items: center; justify-content: center;
            min-height: 70px; background: rgba(0,0,0,0.6); border-radius: 15px; width: 100%;
            position: relative; overflow: hidden; border: 1px solid rgba(168, 85, 247, 0.15); flex-direction: column;
        }
        
        /* --- RESTORE PHOTO LOADING AREA --- */
        #photo-box { width: 50px; height: 50px; display: none; border-radius: 10px; background-size: cover; background-position: center; border: 2px solid var(--lp-main); box-shadow: 0 0 15px var(--lp-glow); }

        .text-3d { 
            font-size: 26px; color: #fff; font-weight: 900;
            text-shadow: 0 3px 0 #6b21a8, 0 0 10px var(--lp-glow); display: none;
        }
        
        .num-box { background: linear-gradient(135deg, var(--lp-main), var(--lp-glow)); color: #1a1a2e; width: 36px; height: 36px; display: none; align-items: center; justify-content: center; border-radius: 10px; font-size: 22px; font-weight: 900; margin-top: 5px; }

        .mode-container { display: flex; gap: 4px; width: 100%; }
        .mode-btn { flex: 1; padding: 7px 0; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--lp-main); border-radius: 10px; color: var(--lp-main); font-size: 8px; font-weight: bold; cursor: pointer; text-align: center; }
        .mode-btn.active { background: var(--lp-main); color: #1a1a2e; box-shadow: 0 0 10px var(--lp-glow); }

        .btn-exe { width: 100%; background: var(--lp-main); border: none; padding: 10px; border-radius: 12px; font-weight: 900; color: #1a1a2e; font-size: 11px; cursor: pointer; box-shadow: 0 4px 0 #9333ea; }
        .btn-exe:disabled { background: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        .btn-hide { position: absolute; top: -5px; right: -5px; width: 22px; height: 22px; background: #1a1a2e; border: 1.2px solid var(--lp-main); color: var(--lp-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; z-index: 10; }
    </style>
</head>
<body>

    <iframe id="game-frame" src="https://www.jaiclub11.com/#/register?invitationCode=28262582138"></iframe>

    <div id="cubeContainer" onclick="toggleUI(false)">
        <div class="cube">
            <div class="cube-face front"></div><div class="cube-face back"></div>
            <div class="cube-face left"></div><div class="cube-face right"></div>
            <div class="cube-face top"></div><div class="cube-face bottom"></div>
        </div>
    </div>

    <div id="mainPanel">
        <div class="btn-hide" onclick="toggleUI(true)">×</div>
        
        <div class="header">☆ JAI CLUB VIP ☆</div>

        <div class="period-no" id="period-display">WAITING...</div>

        <div class="result-area">
            <div id="photo-box"></div>
            
            <div id="calc-display" style="font-family: monospace; font-size: 10px; color: var(--lp-main); text-align: center; display: none;">SCANNING...</div>
            <span id="msg" style="color:#444; font-size:9px;">SYSTEM READY V9</span>
            <div class="text-3d" id="res-txt"></div>
            <div class="num-box" id="num-txt"></div>
        </div>

        <div class="mode-container">
            <div class="mode-btn" id="mode-bs" onclick="selectMode('bs')">B/S</div>
            <div class="mode-btn" id="mode-num" onclick="selectMode('num')">NUM</div>
        </div>

        <button class="btn-exe" id="exe-btn" onclick="runAsuraV9()" disabled>EXECUTE V9</button>
    </div>

    <script>
        // Use recursive logic from V9
        class AsuraDarkMatter {
            constructor() { this.consecutiveLosses = 0; this.lastPrediction = null; }
            calculate() {
                let finalScore = (Math.random() * 100) - 50;
                // Recursive Error Logic (Logic 22)
                if (this.consecutiveLosses >= 2) { finalScore *= -1.2; console.log("⚠️ Loss Recovery Active"); }
                const probSmall = 1 / (1 + Math.exp(-finalScore / 12));
                const decision = probSmall > 0.5 ? "SMALL" : "BIG";
                const num = decision === "BIG" ? [5,6,7,8,9][Math.floor(Math.calculation()*5)] : [0,1,2,3,4][Math.floor(Math.random()*5)];
                this.lastPrediction = decision;
                return { prediction: decision, num: num, mode: this.consecutiveLosses >= 2 ? "RECOVERY" : "STABLE" };
            }
        }

        const AsuraEngine = new AsuraDarkMatter();
        const panel = document.getElementById('mainPanel');
        const cube = document.getElementById('cubeContainer');
        const resTxt = document.getElementById('res-txt');
        const numTxt = document.getElementById('num-txt');
        const photoBox = document.getElementById('photo-box');
        const calcDisplay = document.getElementById('calc-display');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('exe-btn');
        const periodDisplay = document.getElementById('period-display');
        
        let selectedMode = ""; 
        let currentPeriod = "";
        let lastExecutedPeriod = "";

        // UI Drag
        function drag(el) {
            let x, y, ix, iy;
            el.ontouchstart = (e) => { x = e.touches[0].clientX; y = e.touches[0].clientY; ix = el.offsetLeft; iy = el.offsetTop; }
            el.ontouchmove = (e) => { el.style.left = (ix + (e.touches[0].clientX - x)) + 'px'; el.style.top = (iy + (e.touches[0].clientY - y)) + 'px'; }
        }
        drag(panel); drag(cube);

        function selectMode(m) {
            selectedMode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mode-'+m).classList.add('active');
            btn.disabled = false;
        }

        async function fetchPeriod() {
            try {
                const r = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
                const d = await r.json();
                if(d?.data?.list) {
                    let nextP = (BigInt(d.data.list[0].issueNumber) + 1n).toString();
                    if(nextP !== currentPeriod) {
                        currentPeriod = nextP;
                        periodDisplay.innerText = currentPeriod;
                        if(selectedMode !== "") btn.disabled = false;
                    }
                }
            } catch(e) {}
        }
        setInterval(fetchPeriod, 2000);

        function runAsuraV9() {
            if (currentPeriod === lastExecutedPeriod || selectedMode === "") return;
            msg.style.display = 'none'; resTxt.style.display = 'none'; numTxt.style.display = 'none'; calcDisplay.style.display = 'none';
            btn.disabled = true;

            // --- RESTORE YOUR PHOTO LOADING ANIMATION ---
            photoBox.style.backgroundImage = "url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAMCAgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCggNDQoIDQgICggBAwQEBgUGCgYGCg0NCg0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDQ0NDf/AABEIBAACQAMBIgACEQEDEQH/xAAdAAAABwEBAQAAAAAAAAAAAAACAwQFBgcIAQAJ/8QATxAAAgIABAMGAwYFAgQFAQIPAQIDEQAEEiEFMUEGBxMiUWEIMnEUQoGRofAjUrHB0WLhFTNy8QkkQ4KSU6IWNERjsiWDwhhU4nOEo7PS/8QAGwEAAwEBAQEBAAAAAAAAAAAAAAECAwQFBgf/xAAtEQACAgICAgEEAgEFAAMAAAAAAQIRAyESMQRBUQUTImEycRQjQoGRoVKx0f/aAAwDAQACEQMRAD8AOkyw9vxH6YSycOT+Vd/9I/XCx8qel/j/AGwWci3r+mPKO4Zc52Ny7inhiYe6A/2wy8S7k8hL82Wj+qrpPtuP098TR8o3r+n++B/Zn6V+v+MTSGpMq9/hi4aRXgHYcxI4O/UkEb4iuf8Ag/y5J0TSrvYvQ1eg+UEgfW8X8gYc6wYkh6g/1/pg4plfcaMxcX+EeUAmKdWI3AddN7eo/wAYj6fCtnyTfhDlR18/0sV+7xsNc0Ou31woSQe2BwNPvMxxD8L/ABBPMqwtXQS0T+YA/UdN8WP2d7P5vKoQ8Dj+bTTC+WoaSegFj8fXGiI6woQD0vBGPEzlk5Gbpe17KSTqH/UCL6Eb1hXD3hoP+YWX8DX9P3+WNBy8IibcohPPdQd/y54HHwaI7eGn/wAR/jF7M7M7y9v4W++vXY7H9cNedzULbgj3xpTPdjsu+zwxMDtuinb05fv8sRLjHcRlGHkiRCedKB/TCdhaKIizKqbV9J9QcP8AD2msAMQ/vyb8+R/LDhxv4eNN6FY+wLAV9QT/AEw1RdyMhNKZRy3JYAV9TjJ70yxDmOHB9bAK6kgaTQPKyBt+h54Sdlokjkd4oHWxpfkF2og6SefuMS/MfDjKFDR5iTX6EkDr1s3+I3xE832Dz+XPzORfNgGBA6E1iVirrRTnZKG42RYmOTvT1/j/AGwWci3r+mPKO4Zc52Ny7inhiYe6A/2wy8S7k8hL82Wj+qrpPtuP098TR8o3r+n++B/Zn6V+v+MTSGpMq9/hi4aRXgHYcxI4O/UkEb4iuf8Ag/y5J0TSrvYvQ1eg+UEgfW8X8gYc6wYkh6g/1/pg4plfcaMxcX+EeUAmKdWI3AddN7eo/wAYj6fCtnyTfhDlR18/0sV+7xsNc0Ou31woSQe2BwNPvMxxD8L/ABBPMqwtXQS0T+YA/UdN8WP2d7P5vKoQ8Dj+bTTC+WoaSegFj8fXGiI6woQD0vBGPEzlk5Gbpe17KSTqH/UCL6Eb1hXD3hoP+YWX8DX9P3+WNBy8IibcohPPdQd/y54HHwaI7eGn/wAR/jF7M7M7y9v4W++vXY7H9cNedzULbgj3xpTPdjsu+zwxMDtuinb05fv8sRLjHcRlGHkiRCedKB/TCdhaKIizKqbV9J9QcP8AD2msAMQ/vyb8+R/LDhxv4eNN6FY+wLAV9QT/AEw1RdyMhNKZRy3JYAV9TjJ70yxDmOHB9bAK6kgaTQPKyBt+h54Sdlokjkd4oHWxpfkF2og6SefuMS/MfDjKFDR5iTX6EkDr1s3+I3xE832Dz+XPzORfNgGBA6E1iVirrRTnZKG42RYmOTvT1/j/AGwWci3r+mPKO4Zc52Ny7inhiYe6A/2wy8S7k8hL82Wj+qrpPtuP098TR8o3r+n++B/Zn6V+v+MTSGpMq9/hi4aRXgHYcxI4O/UkEb4iuf8Ag/y5J0TSrvYvQ1eg+UEgfW8X8gYc6wYkh6g/1/pg4plfcaMxcX+EeUAmKdWI3AddN7eo/wAYj6fCtnyTfhDlR18/0sV+7xsNc0Ou31woSQe2BwNPvMxxD8L/ABBPMqwtXQS0T+YA/UdN8WP2d7P5vKoQ8Dj+bTTC+WoaSegFj8fXGiI6woQD0vBGPEzlk5Gbpe17KSTqH/UCL6Eb1hXD3hoP+YWX8DX9P3+WNBy8IibcohPPdQd/y54HHwaI7eGn/wAR/jF7M7M7y9v4W++vXY7H9cNedzULbgj3xpTPdjsu+zwxMDtuinb05fv8sRLjHcRlGHkiRCedKB/TCdhaKIizKqbV9J9QcP8AD2msAMQ/vyb8+R/LDhxv4eNN6FY+wLAV9QT/AEw1RdyMhNKZRy3JYAV9TjJ70yxDmOHB9bAK6kgaTQPKyBt+h54Sdlokjkd4oHWxpfkF2og6SefuMS/MfDjKFDR5iTX6EkDr1s3+I3xE832Dz+XPzORfNgGBA6E1iVirrRTnZKG42');";
            photoBox.style.display = 'block';

            setTimeout(() => {
                photoBox.style.display = 'none';
                const data = AsuraEngine.calculate();
                lastExecutedPeriod = currentPeriod;
                
                // Result Display Restore
                resTxt.innerText = data.prediction;
                resTxt.style.color = data.prediction === "BIG" ? "#fbbf24" : "#22d3ee";
                resTxt.style.display = 'block';

                // Recovery Glow
                if(data.mode === "RECOVERY") {
                    panel.style.boxShadow = "0 0 40px rgba(255, 0, 0, 0.6)";
                } else {
                    panel.style.boxShadow = "0 8px 25px rgba(168, 85, 247, 0.5)";
                }

                if (selectedMode === 'num') {
                    numTxt.innerText = data.num; numTxt.style.display = 'flex';
                }
                btn.innerText = "WAIT NEXT";
            }, 2000); // 2 Seconds photo flash
        }

        function toggleUI(hide) {
            if(hide) { panel.style.display='none'; cube.style.display='flex'; cube.style.top=panel.style.top; cube.style.left=panel.style.left; }
            else { panel.style.display='flex'; cube.style.display='none'; panel.style.top=cube.style.top; panel.style.left=cube.style.left; }
        }
    </script>
</body>
</html>
