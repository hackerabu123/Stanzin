<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MB MOD - PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; background: #000; }
        .bg-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

        #modCard {
            position: absolute; top: 12%; left: 50%; transform: translateX(-50%);
            width: 290px; background: #F3E8FF; border-radius: 35px; padding: 18px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 100; touch-action: none; border: 2.5px solid #A29BFE;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: move; }
        .brand { color: #6C5CE7; font-weight: 900; font-size: 15px; }
        .user-photo { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #A29BFE; object-fit: cover; }
        
        #periodDisplay { 
            background: #6C5CE7; color: white; padding: 10px; 
            border-radius: 50px; font-size: 12px; font-weight: 900; 
            display: inline-block; margin-bottom: 10px; width: 100%;
        }
        
        .result-box { border: 2.5px solid #E0D4FF; border-radius: 28px; padding: 20px 0; margin-bottom: 15px; background: #fff; min-height: 110px; display: flex; align-items: center; justify-content: center; position: relative; overflow: visible; }

        .prediction-text {
            font-size: 40px; font-weight: 900; font-style: italic;
            background: linear-gradient(to right, #6C5CE7, #A29BFE);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        
        #numDisplay { font-size: 45px; color: #6C5CE7; font-weight: 900; font-style: italic; display: none; }

        /* Left-Side Shatter Animation */
        .pixel { position: absolute; background: #6C5CE7; width: 5px; height: 5px; border-radius: 1px; pointer-events: none; opacity: 0; animation: shatterLeft 0.8s ease-out forwards; }
        @keyframes shatterLeft { 
            0% { transform: translate(-20px, 0) scale(1); opacity: 1; } 
            100% { transform: translate(40px, -20px) rotate(45deg) scale(0); opacity: 0; } 
        }

        .btns { display: flex; flex-direction: column; gap: 8px; }
        .main-btns { display: flex; gap: 8px; }
        button { padding: 12px; border-radius: 50px; border: none; font-weight: 900; font-size: 10px; cursor: pointer; }
        .btn-p { background: #6C5CE7; color: white; flex: 1; }
        .btn-n { background: #A29BFE; color: white; flex: 1; }
        .btn-hide { background: #E0D4FF; color: #6C5CE7; width: 100%; }

        .full-layer { position: absolute; bottom: 0; left: 0; width: 100%; height: 85%; background: #F3E8FF; z-index: 500; display: none; padding: 30px 20px; overflow-y: auto; border-radius: 45px 45px 0 0; }
        .stats-title { font-size: 28px; color: #3b3486; margin-bottom: 25px; font-weight: 900; }
        
        .bar-chart { display: flex; align-items: flex-end; justify-content: space-around; height: 110px; margin-bottom: 35px; padding: 0 10px; }
        .bar { width: 20px; background: linear-gradient(#A29BFE, #6C5CE7); border-radius: 5px; transition: height 0.5s; }
        
        .circle-ui { width: 75px; height: 75px; border: 4px solid #E0D4FF; border-top: 4px solid #6C5CE7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #3b3486; font-size: 18px; animation: rotate-border 2s linear infinite; margin-bottom: 5px; position: relative; }
        @keyframes rotate-border { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Navigation Bar - Light Purple Updated */
        #bottomNav { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 310px; height: 75px; background: #F3E8FF; border-radius: 50px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 35px rgba(0,0,0,0.4); z-index: 600; border: 2px solid #A29BFE; }
        .nav-item { text-align: center; color: #A29BFE; flex: 1; font-size: 9px; font-weight: 900; cursor: pointer; }
        .nav-item.active { color: #6C5CE7; }
        .nav-item svg { width: 22px; height: 22px; display: block; margin: 0 auto 4px; fill: currentColor; }
        
        #hideIcon { position: absolute; top: 100px; right: 20px; width: 60px; height: 60px; background: #F3E8FF; border-radius: 50%; display: none; align-items: center; justify-content: center; border: 3px solid #A29BFE; z-index: 700; overflow: hidden; }
        #hideIcon img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <iframe class="bg-frame" src="https://www.jaiclub01.com/#/register?invitationCode=28262582138"></iframe>

    <div id="modCard">
        <div class="header" id="cardHandle">
            <span class="brand">MB ANALYTICS</span>
            <img src="https://i.ibb.co/Hfk3vqyc/images-6.jpg" class="user-photo">
        </div>
        <div id="periodDisplay">PERIOD :- LOADING...</div>
        <div class="result-box" id="pBox">
            <div id="mainPrediction" class="prediction-text">WAIT</div>
            <div id="numDisplay">?</div>
        </div>
        <div class="btns">
            <div class="main-btns">
                <button class="btn-p" onclick="setMode('pred')">PREDICTION</button>
                <button class="btn-n" onclick="setMode('num')">NUMBER</button>
            </div>
            <button class="btn-hide" onclick="toggleHide(true)">HIDE PANEL</button>
        </div>
    </div>

    <div id="winRateLayer" class="full-layer">
        <h1 class="stats-title">ANALYTICS</h1>
        <div class="bar-chart">
            <div class="bar" style="height: 60%"></div>
            <div class="bar" style="height: 40%"></div>
            <div class="bar" style="height: 80%"></div>
            <div class="bar" style="height: 50%"></div>
            <div class="bar" style="height: 70%"></div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <div style="text-align:center;"><div class="circle-ui"><span id="bigCount">0</span></div><p style="font-size:10px; font-weight:900; color:#6C5CE7;">BIG</p></div>
            <div style="text-align:center;"><div class="circle-ui"><span id="smallCount">0</span></div><p style="font-size:10px; font-weight:900; color:#6C5CE7;">SMALL</p></div>
            <div style="text-align:center;"><div class="circle-ui"><span id="totalCount">0</span></div><p style="font-size:10px; font-weight:900; color:#6C5CE7;">TOTAL</p></div>
        </div>
    </div>

    <div id="historyLayer" class="full-layer">
        <h1 class="stats-title">HISTORY</h1>
        <div id="historyList"></div>
    </div>

    <div id="hideIcon" onclick="toggleHide(false)">
        <img src="https://i.ibb.co/Hfk3vqyc/images-6.jpg">
    </div>

    <div id="bottomNav">
        <div class="nav-item active" id="btnHack" onclick="showLayer('hack')"><svg viewBox="0 0 24 24"><path d="M13 10V3L4 14H11V21L20 10H13Z"/></svg><span>HACK</span></div>
        <div class="nav-item" id="btnHist" onclick="showLayer('history')"><svg viewBox="0 0 24 24"><path d="M13 3C8 3 4 7 4 12H1L5 16L9 12H6C6 8.1 9.1 5 13 5C16.9 5 20 8.1 20 12C20 15.9 16.9 19 13 19C11.1 19 9.3 18.2 8.1 16.9L6.6 18.4C8.2 20 10.5 21 13 21C18 21 22 17 22 12C22 7 18 3 13 3Z"/></svg><span>HISTORY</span></div>
        <div class="nav-item" id="btnWin" onclick="showLayer('winrate')"><svg viewBox="0 0 24 24"><path d="M11 2V22C5.9 21.5 2 17.2 2 12C2 6.8 5.9 2.5 11 2M13 2C18.1 2.5 22 6.8 22 12C22 12.7 21.9 13.4 21.8 14.1L13 11.1V2M13 13.3L21.3 16C20.2 18.6 17.9 20.5 15.2 21.4L13 13.3Z"/></svg><span>ANALYTICS</span></div>
    </div>

    <script>
        let currentPeriod = "";
        let lastLoggedPeriod = "";
        let stats = { big: 0, small: 0, total: 0 };
        let activePred = { p: "WAIT", n: "?" };
        let currentMode = 'pred';

        function formatPeriod(p) { return p.substring(0, 3) + "XXXXXX" + p.substring(p.length - 3); }

        function triggerShatter() {
            const b = document.getElementById('pBox');
            if (currentMode !== 'pred') return;
            for(let i=0; i<12; i++) {
                const p = document.createElement('div');
                p.className = 'pixel';
                p.style.top = (40 + Math.random()*30) + 'px';
                p.style.left = (60 + Math.random()*20) + 'px';
                b.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function updateLogic() {
            const now = new Date();
            const kolkata = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (3600000 * 5.5));
            let elapsed = (kolkata.getHours() * 60 + kolkata.getMinutes()) - (5 * 60 + 29);
            if (elapsed < 0) elapsed = 0;
            const dateStr = kolkata.getFullYear() + String(kolkata.getMonth() + 1).padStart(2, '0') + String(kolkata.getDate()).padStart(2, '0');
            currentPeriod = `${dateStr}100001${String(elapsed).padStart(4, '0')}`;

            document.getElementById('periodDisplay').innerText = "PERIOD :- " + formatPeriod(currentPeriod);

            if (currentPeriod !== lastLoggedPeriod) {
                const preds = ["BIG", "SMALL"];
                activePred.p = preds[Math.floor(Math.random() * preds.length)];
                activePred.n = Math.floor(Math.random() * 10);
                
                stats.total++;
                if(activePred.p === "BIG") stats.big++; else stats.small++;
                
                updateStatsUI();
                addHistory(currentPeriod, activePred.p, activePred.n);
                lastLoggedPeriod = currentPeriod;
                
                triggerShatter();
                showUIResult(currentMode);
            }
        }

        function setMode(m) {
            currentMode = m;
            if (m === 'pred') triggerShatter();
            showUIResult(m);
        }

        function showUIResult(mode) {
            const pTxt = document.getElementById('mainPrediction');
            const nTxt = document.getElementById('numDisplay');
            if(mode === 'pred') { pTxt.style.display = "block"; nTxt.style.display = "none"; pTxt.innerText = activePred.p; }
            else { pTxt.style.display = "none"; nTxt.style.display = "block"; nTxt.innerText = activePred.n; }
        }

        function updateStatsUI() {
            document.getElementById('bigCount').innerText = stats.big;
            document.getElementById('smallCount').innerText = stats.small;
            document.getElementById('totalCount').innerText = stats.total;
            document.querySelectorAll('.bar').forEach(b => b.style.height = (Math.random()*60+20)+'%');
        }

        function addHistory(period, p, n) {
            const hList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.style = "background:#fff; border:1px solid #E0D4FF; border-radius:25px; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;";
            item.innerHTML = `<div><div style="font-size:12px; color:#A29BFE; font-weight:900;">${formatPeriod(period)}</div><div style="font-size:20px; font-weight:900; color:#6C5CE7;">${p} ${n}</div></div><div style="color:#b5b0f5; font-size:10px; font-weight:900;">SECURE</div>`;
            hList.prepend(item);
        }

        function showLayer(t) {
            document.getElementById('historyLayer').style.display = t === 'history' ? 'block' : 'none';
            document.getElementById('winRateLayer').style.display = t === 'winrate' ? 'block' : 'none';
            document.getElementById('modCard').style.display = t === 'hack' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const id = t === 'winrate' ? 'btnWin' : (t === 'history' ? 'btnHist' : 'btnHack');
            document.getElementById(id).classList.add('active');
        }

        function toggleHide(h) {
            document.getElementById('modCard').style.display = h ? 'none' : 'block';
            document.getElementById('hideIcon').style.display = h ? 'flex' : 'none';
        }

        function makeMoveable(el, hId) {
            let p1=0, p2=0, p3=0, p4=0, h = document.getElementById(hId) || el;
            h.onpointerdown = (e) => {
                p3 = e.clientX; p4 = e.clientY;
                document.onpointermove = (ev) => {
                    p1 = p3 - ev.clientX; p2 = p4 - ev.clientY; p3 = ev.clientX; p4 = ev.clientY;
                    el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px"; el.style.transform = "none";
                };
                document.onpointerup = () => document.onpointermove = null;
            };
        }
        
        makeMoveable(document.getElementById("modCard"), "cardHandle");
        setInterval(updateLogic, 1000);
    </script>
</body>
                                                                                              </html>
