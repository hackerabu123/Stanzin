<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinGo God-Mode v11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');
        body { background: #06040d; color: #e9d5ff; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .glass-panel { background: rgba(139, 92, 246, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(167, 139, 250, 0.15); border-radius: 28px; }
        .stat-card { background: linear-gradient(145deg, rgba(30, 15, 60, 0.6), rgba(10, 5, 20, 0.8)); border: 1px solid rgba(167, 139, 250, 0.1); border-radius: 20px; text-align: center; padding: 12px; }
        .tab-content { display: none; height: 78vh; overflow-y: auto; padding-bottom: 80px; }
        .active-tab { display: block; }
        .nav-active { color: #a78bfa; border-bottom: 3px solid #a78bfa; background: linear-gradient(to top, rgba(167, 139, 250, 0.1), transparent); }
        .node-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; }
        .ai-node { width: 8px; height: 8px; border-radius: 2px; background: #2e1065; transition: 0.4s; }
        .node-big { background: #f97316; box-shadow: 0 0 8px #f97316; }
        .node-small { background: #8b5cf6; box-shadow: 0 0 8px #8b5cf6; }
    </style>
</head>
<body class="p-3 max-w-md mx-auto">

    <header class="flex justify-between items-center mb-4 px-2">
        <div class="flex flex-col">
            <h1 class="text-lg font-black tracking-tighter text-purple-400 italic">GOD-MODE v11</h1>
            <span class="text-[8px] tracking-[0.4em] text-purple-600 uppercase">Neural Link Active</span>
        </div>
        <div id="ai-status" class="text-[9px] font-bold text-green-400 bg-green-500/10 px-3 py-1 rounded-full border border-green-500/20">
            SYNCED
        </div>
    </header>

    <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="stat-card">
            <p class="text-[8px] text-purple-400 uppercase font-bold">Total</p>
            <p id="stat-total" class="text-lg font-black text-white">0</p>
        </div>
        <div class="stat-card border-green-500/20">
            <p class="text-[8px] text-green-400 uppercase font-bold">Wins</p>
            <p id="stat-win" class="text-lg font-black text-green-400">0</p>
        </div>
        <div class="stat-card border-red-500/20">
            <p class="text-[8px] text-red-400 uppercase font-bold">Loss</p>
            <p id="stat-loss" class="text-lg font-black text-red-400">0</p>
        </div>
    </div>

    <div id="dashboard" class="tab-content active-tab">
        <div class="glass-panel p-8 text-center mb-4 relative overflow-hidden">
            <p class="text-[10px] text-purple-500 font-mono mb-2 uppercase tracking-widest">Period: <span id="period-no">----</span></p>
            <div id="prediction" class="text-7xl font-black italic mb-6 text-slate-800 tracking-tighter">WAIT</div>
            
            <div class="node-grid mb-4 px-4" id="matrix"></div>
            
            <div class="flex justify-between text-[10px] font-bold text-purple-400 border-t border-white/5 pt-4">
                <span>Accuracy: <span id="conf">0%</span></span>
                <span>Martingale: <span id="m-lvl" class="text-yellow-500">X1</span></span>
            </div>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="glass-panel p-4 mb-4">
            <div class="flex items-center gap-2 mb-3">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                <h3 class="text-xs font-black text-purple-400 uppercase">Hack History</h3>
            </div>
            <div id="hack-history" class="space-y-2 max-h-48 overflow-y-auto pr-1"></div>
        </div>

        <div class="glass-panel p-4">
            <div class="flex items-center gap-2 mb-3">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                <h3 class="text-xs font-black text-orange-400 uppercase">Game History</h3>
            </div>
            <div id="game-history" class="space-y-1 max-h-48 overflow-y-auto"></div>
        </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 glass-panel flex p-1 border-white/10 shadow-2xl">
        <button onclick="tab('dashboard')" id="nav-dashboard" class="flex-1 py-3 text-[10px] font-black uppercase nav-active">Dashboard</button>
        <button onclick="tab('history')" id="nav-history" class="flex-1 py-3 text-[10px] font-black uppercase text-purple-600">History Center</button>
    </div>

    <script>
        let lastP = ""; let lastPred = ""; let m = 1; 
        let wins = 0; let loss = 0; let total = 0;

        const mx = document.getElementById('matrix');
        for(let i=0; i<60; i++) {
            const d = document.createElement('div');
            d.className = 'ai-node'; d.id = 'n-'+i; mx.appendChild(d);
        }

        function tab(t) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active-tab'));
            document.getElementById(t).classList.add('active-tab');
            document.querySelectorAll('button').forEach(b => b.classList.remove('nav-active', 'text-white'));
            document.getElementById('nav-'+t).classList.add('nav-active', 'text-white');
        }

        async function engine() {
            try {
                const res = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
                const d = await res.json(); const list = d.data.list; const top = list[0];
                const next = (BigInt(top.issueNumber) + 1n).toString();

                if (lastP === top.issueNumber) {
                    const act = parseInt(top.number) >= 5 ? "BIG" : "SMALL";
                    const isWin = lastPred === act;
                    total++; if(isWin) { wins++; m=1; } else { loss++; m*=3; }
                    updateStats();
                    addHackLog(top.issueNumber, lastPred, act, isWin);
                }

                if (lastP !== next) {
                    lastP = next; document.getElementById('period-no').innerText = next;
                    let bigs = 0;
                    for(let i=0; i<60; i++) {
                        let node = document.getElementById('n-'+i);
                        let decision = (Math.random() + (parseInt(top.number)/9))/2 > 0.5 ? "B" : "S";
                        if(decision === "B") { bigs++; node.className = 'ai-node node-big'; }
                        else { node.className = 'ai-node node-small'; }
                    }
                    lastPred = bigs >= 30 ? "BIG" : "SMALL";
                    const conf = ((bigs/60)*100).toFixed(0);
                    const pDisp = document.getElementById('prediction');
                    pDisp.innerText = lastPred;
                    pDisp.className = `text-7xl font-black italic mb-6 ${lastPred === 'BIG' ? 'text-orange-500' : 'text-purple-400'}`;
                    document.getElementById('conf').innerText = conf + "%";
                    document.getElementById('m-lvl').innerText = "X" + m;
                    speechSynthesis.speak(new SpeechSynthesisUtterance(lastPred));
                }

                let gHtml = "";
                list.slice(0, 10).forEach(i => {
                    const s = parseInt(i.number) >= 5 ? "BIG" : "SMALL";
                    gHtml += `<div class="flex justify-between p-2 bg-white/5 rounded-lg text-[10px] border-l-2 ${s==='BIG'?'border-orange-500':'border-purple-500'}">
                        <span>#${i.issueNumber.slice(-3)}</span><span>Num: ${i.number}</span><span class="font-bold">${s}</span></div>`;
                });
                document.getElementById('game-history').innerHTML = gHtml;
            } catch (e) {}
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-win').innerText = wins;
            document.getElementById('stat-loss').innerText = loss;
        }

        function addHackLog(p, prd, act, win) {
            const div = document.createElement('div');
            div.className = `flex justify-between items-center p-3 rounded-xl border ${win?'border-green-500/20 bg-green-500/5':'border-red-500/20 bg-red-500/5'} text-[10px]`;
            div.innerHTML = `<span>#${p.slice(-3)}</span><span class="font-bold uppercase">${prd} vs ${act}</span>
                <div class="flex items-center gap-1 font-black ${win?'text-green-400':'text-red-400'}">
                ${win?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> WIN':'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> LOSS'}</div>`;
            document.getElementById('hack-history').prepend(div);
        }

        setInterval(engine, 5000); engine();
    </script>
</body>
</html>
