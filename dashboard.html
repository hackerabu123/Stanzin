<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAI CLUB VIP - FIXED V11</title>
    <style>
        :root {
            --lp-main: #d8b4fe;
            --av-main: #ff4d4d;
            --panel-bg: rgba(10, 5, 20, 0.98);
            --wingo-neon: #a855f7;
            --aviator-neon: #ef4444;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #game-frame { width: 100%; height: 100%; border: none; position: absolute; }

        /* CIRCULAR ICONS & RINGS CONTAINER */
        .icon-wrapper {
            position: fixed; width: 70px; height: 70px;
            z-index: 10000; cursor: pointer; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }
        #wrapperWingo { top: 100px; left: 20px; }
        #wrapperAviator { top: 190px; left: 20px; }

        .circle-icon {
            width: 55px; height: 55px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            background-size: cover; background-position: center; background-color: #fff;
            position: absolute;
        }
        
        #iconWingo { background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTT-9hiXOartb7om_yRT4XVGfUMh5fQNfh2Ig&s'); }
        #iconAviator { background-image: url('https://static.vecteezy.com/ti/gratis-vector/p1/14976138-premie-vliegenier-logo-embleem-klein-propeller-vlak-vliegtuig-geisoleerd-vector.jpg'); }

        /* HALF CIRCULAR RINGS (NEON) */
        .half-ring {
            position: absolute; width: 66px; height: 66px;
            border-radius: 50%; border: 3px solid transparent;
            animation: rotateRing 2s linear infinite;
        }
        #wrapperWingo .half-ring {
            border-top-color: var(--wingo-neon);
            border-right-color: var(--wingo-neon);
            box-shadow: 0 0 10px var(--wingo-neon);
        }
        #wrapperAviator .half-ring {
            border-top-color: var(--aviator-neon);
            border-right-color: var(--aviator-neon);
            box-shadow: 0 0 10px var(--aviator-neon);
        }

        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* PANELS */
        .ui-panel {
            position: fixed; width: 220px; background: var(--panel-bg); 
            border-radius: 20px; padding: 15px; z-index: 9999;
            display: none; flex-direction: column; gap: 10px; border: 1.5px solid;
            backdrop-filter: blur(5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #wingoPanel { top: 80px; left: 15px; border-color: var(--lp-main); }
        #aviatorPanel { top: 80px; left: 15px; border-color: var(--av-main); }

        .header { font-size: 12px; font-weight: 900; text-align: center; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        .display-box { font-size: 16px; color: #fff; font-weight: 900; text-align: center; background: rgba(255,255,255,0.08); border-radius: 8px; padding: 8px; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.1); }
        
        .mode-container { display: flex; gap: 5px; }
        .mode-btn { flex: 1; padding: 8px; border: 1px solid rgba(216, 180, 254, 0.4); border-radius: 8px; color: var(--lp-main); font-size: 10px; font-weight: bold; cursor: pointer; background: transparent; transition: 0.2s; }
        .mode-btn.active { background: var(--lp-main); color: #000; box-shadow: 0 0 10px var(--lp-main); }

        .result-area { min-height: 80px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Modified Button Style for Locked State */
        .btn-exe { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 900; color: #fff; background: #555; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-exe.locked { background: #333; color: #aaa; }
        .btn-exe.wingo-active { background: var(--lp-main); color: #000; box-shadow: 0 0 15px var(--wingo-neon); }
        .btn-exe.aviator-active { background: var(--av-main); color: #fff; box-shadow: 0 0 15px var(--aviator-neon); }

        .btn-hide { position: absolute; top: -8px; right: -8px; width: 28px; height: 28px; background: #000; border: 2px solid #fff; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <iframe id="game-frame" src="https://www.jaiclub11.com/#/register?invitationCode=28262582138"></iframe>

    <div id="wrapperWingo" class="icon-wrapper" onclick="openUI('wingo')">
        <div class="half-ring"></div>
        <div id="iconWingo" class="circle-icon"></div>
    </div>

    <div id="wrapperAviator" class="icon-wrapper" onclick="openUI('aviator')">
        <div class="half-ring"></div>
        <div id="iconAviator" class="circle-icon"></div>
    </div>

    <div id="wingoPanel" class="ui-panel">
        <div class="btn-hide" onclick="closeUI('wingo')">×</div>
        <div class="header" style="color: #fbbf24; text-shadow: 0 0 5px #fbbf24;">☆ JAI CLUB WINGO ☆</div>
        <div class="display-box" id="period-display">LOADING...</div>
        <div class="result-area">
            <span id="msg" style="color:#ff4d4d; font-size:11px; font-weight: bold; letter-spacing: 1px;">Click Below to Activate</span>
            <div id="res-txt" style="font-size:30px; font-weight:900; color:#fff; display:none; text-shadow: 0 0 10px #fff;"></div>
        </div>
        <div class="mode-container">
            <button class="mode-btn active" id="m-bs" onclick="setMode('bs')">B/S</button>
            <button class="mode-btn" id="m-num" onclick="setMode('num')">NUM</button>
        </div>
        <button class="btn-exe locked" id="exe-wingo" onclick="handleWingoClick()">Activate Panel</button>
    </div>

    <div id="aviatorPanel" class="ui-panel">
        <div class="btn-hide" onclick="closeUI('aviator')">×</div>
        <div class="header" style="color: var(--av-main); text-shadow: 0 0 5px var(--av-main);">✈ AVIATOR ULTRA ✈</div>
        <div class="display-box" id="av-time">00:00:00</div>
        <div class="result-area">
            <span id="av-msg" style="color:#ff4d4d; font-size:11px; font-weight: bold; letter-spacing: 1px;">Click Below to Activate</span>
            <div id="av-res" style="font-size:30px; font-weight:900; color:#ff4d4d; display:none; text-shadow: 0 0 10px var(--av-main);"></div>
        </div>
        <button class="btn-exe locked" id="exe-aviator" onclick="handleAviatorClick()">Activate Panel</button>
    </div>

    <script>
        let isWingoActivated = false;
        let isAviatorActivated = false;
        let selectedMode = 'bs';

        function openUI(type) {
            // Close other panel first
            document.getElementById('wingoPanel').style.display = 'none';
            document.getElementById('aviatorPanel').style.display = 'none';
            document.getElementById('wrapperWingo').style.display = 'flex';
            document.getElementById('wrapperAviator').style.display = 'flex';

            document.getElementById(type + 'Panel').style.display = 'flex';
            document.getElementById('wrapper' + (type === 'wingo' ? 'Wingo' : 'Aviator')).style.display = 'none';
        }
        function closeUI(type) {
            document.getElementById(type + 'Panel').style.display = 'none';
            document.getElementById('wrapper' + (type === 'wingo' ? 'Wingo' : 'Aviator')).style.display = 'flex';
        }

        // --- FIX LOGIC FOR ACTIVATION ---

        function handleWingoClick() {
            if (!isWingoActivated) {
                activateWingo();
            } else {
                runWingo();
            }
        }

        function handleAviatorClick() {
            if (!isAviatorActivated) {
                activateAviator();
            } else {
                runAviator();
            }
        }

        function activateWingo() {
            isWingoActivated = true;
            document.getElementById('msg').innerText = "SYSTEM READY V11";
            document.getElementById('msg').style.color = "#22c55e"; 
            
            const wb = document.getElementById('exe-wingo');
            wb.innerText = "EXECUTE";
            wb.classList.remove('locked');
            wb.classList.add('wingo-active');
            
            // Optional sound effect
            // new Audio('https://www.soundjay.com/buttons/sounds/button-3.mp3').play();
        }

        function activateAviator() {
            isAviatorActivated = true;
            document.getElementById('av-msg').innerText = "SYSTEM SECURE";
            document.getElementById('av-msg').style.color = "#22c55e";
            
            const ab = document.getElementById('exe-aviator');
            ab.innerText = "GET PREDICTION";
            ab.classList.remove('locked');
            ab.classList.add('aviator-active');
        }

        // --- PREDICTION LOGIC ---

        function setMode(m) {
            selectedMode = m;
            document.querySelectorAll('#wingoPanel .mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('m-'+m).classList.add('active');
        }

        function runWingo() {
            const res = document.getElementById('res-txt');
            res.style.display = "none";
            document.getElementById('msg').innerText = "ANALYZING...";
            document.getElementById('msg').style.color = "#fff";

            setTimeout(() => {
                let out = "";
                if (selectedMode === 'bs') {
                    out = Math.random() > 0.5 ? "BIG" : "SMALL";
                    res.style.color = out === "BIG" ? "#fbbf24" : "#22d3ee";
                } else {
                    out = Math.floor(Math.random() * 10);
                    res.style.color = "#fff";
                }
                
                res.innerText = out;
                res.style.display = "block";
                document.getElementById('msg').innerText = "PREDICTION SECURE";
                document.getElementById('msg').style.color = "#22c55e";
            }, 1000);
        }

        function runAviator() {
            const res = document.getElementById('av-res');
            res.style.display = "none";
            document.getElementById('av-msg').innerText = "CALCULATING...";
            document.getElementById('av-msg').style.color = "#fff";

            setTimeout(() => {
                // Generates random number between 1.10 and 3.50
                const val = (1.10 + (Math.random() * 2.40)).toFixed(2);
                res.innerText = val + "x";
                res.style.display = "block";
                document.getElementById('av-msg').innerText = "SAFE EXIT POINT";
                document.getElementById('av-msg').style.color = "#22c55e";
            }, 1200);
        }

        // --- UTILITIES ---

        async function fetchPeriod() {
            // Updated API check with timestamp to prevent caching
            try {
                const r = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
                const d = await r.json();
                if(d?.data?.list) {
                    const next = (BigInt(d.data.list[0].issueNumber) + 1n).toString();
                    document.getElementById('period-display').innerText = next;
                }
            } catch(e) {
                // Fallback if API fails
                if(document.getElementById('period-display').innerText === "LOADING...") {
                    document.getElementById('period-display').innerText = "CONNECTION ERR";
                }
            }
        }
        
        // Initial fetch and set interval
        fetchPeriod();
        setInterval(fetchPeriod, 5000); // Fetch every 5 seconds
        
        // Clock
        setInterval(() => { document.getElementById('av-time').innerText = new Date().toLocaleTimeString(); }, 1000);

        // DRAGGABLE LOGIC
        function makeDrag(el) {
            let posX = 0, posY = 0, initialX = 0, initialY = 0;

            el.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                if (e.type !== 'touchstart') { e.preventDefault(); }
                
                initialX = el.offsetLeft;
                initialY = el.offsetTop;
                
                if (e.type === 'touchstart') {
                    posX = e.touches[0].clientX;
                    posY = e.touches[0].clientY;
                } else {
                    posX = e.clientX;
                    posY = e.clientY;
                }
                
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                
                let clientX, clientY;
                if (e.type === 'touchmove') {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                let deltaX = clientX - posX;
                let deltaY = clientY - posY;
                
                el.style.left = (initialX + deltaX) + "px";
                el.style.top = (initialY + deltaY) + "px";
            }

            function closeDragElement() {
                document.ontouchend = null;
                document.ontouchmove = null;
            }
        }
        
        // Apply dragging to wrappers
        makeDrag(document.getElementById('wrapperWingo'));
        makeDrag(document.getElementById('wrapperAviator'));
    </script>
</body>
</html>
