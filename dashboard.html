<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>MADARA VIP MOD - LIGHT GLOW</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; background: #050505; font-family: system-ui; color: white; font-weight: bold; height: 100vh; overflow: hidden; }

/* TOAST */
#toast { visibility: hidden; min-width: 200px; background: #1a1a1a; color: #fff; text-align: center; border-radius: 20px; padding: 12px; position: fixed; z-index: 2000; left: 50%; bottom: 100px; transform: translateX(-50%); opacity: 0; transition: 0.3s; border: 1.5px solid #7c68ff; }
#toast.show { visibility: visible; opacity: 1; }

/* ANIMATIONS */
@keyframes trophy-bounce { 0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 5px #3cff95); } 50% { transform: translateY(-5px) scale(1.1); filter: drop-shadow(0 0 15px #3cff95); } }
@keyframes loss-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
@keyframes gold-glow { 0%, 100% { color: #ffd700; text-shadow: 0 0 5px #ffd700; } 50% { color: #fff; text-shadow: 0 0 15px #ffd700; } }

.screen { height: 100vh; width: 100%; overflow-y: auto; display: none; padding-bottom: 90px; }
#home-screen { display: block; }

.header { background: linear-gradient(90deg,#7b67ff,#8c73ff); padding: 14px; display: flex; align-items: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; margin-bottom: 12px; }
.avatar { width: 45px; height: 45px; border-radius: 50%; background: url('https://i.ibb.co/Hfk3vqyc/images-6.jpg'); background-size: cover; border: 2px solid #fff; margin-right: 12px; }

.container { padding: 0 12px; }
.compact-box { background: #121212; border-radius: 20px; padding: 12px 18px; display: flex; align-items: center; margin-bottom: 8px; border: 1px solid rgba(124, 104, 255, 0.4); }
.val-small { background: #7c68ff; border-radius: 12px; padding: 5px 15px; font-size: 15px; min-width: 90px; text-align: center; margin-left: auto; }

/* PROGRESS RINGS */
.circles-line { display: flex; justify-content: space-around; margin: 20px 0; }
.prog-ring { position: relative; width: 55px; height: 55px; }
.prog-ring svg { width: 55px; height: 55px; transform: rotate(-90deg); }
.prog-ring circle { fill: none; stroke-width: 6; stroke-linecap: round; }
.bg-c { stroke: #1a1a1a; }
.fg-c { stroke-dasharray: 144.5; stroke-dashoffset: 144.5; transition: 1.5s; }
.ring-val { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-family: 'Poppins'; }

/* STATS GRID - HALKA COLOUR BOXES */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card { padding: 15px 10px; border-radius: 20px; text-align: center; border: 1.5px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
.stat-card .count { font-size: 24px; font-family: 'Poppins'; display: block; margin-top: 5px; }

/* Light Color Themes */
.lab-win { background: rgba(60, 255, 149, 0.08); color: #3cff95; border-color: rgba(60, 255, 149, 0.3); }
.lab-loss { background: rgba(255, 60, 60, 0.08); color: #ff3c3c; border-color: rgba(255, 60, 60, 0.3); }
.lab-jack { background: rgba(124, 104, 255, 0.08); color: #b39dff; border-color: rgba(124, 104, 255, 0.3); }
.lab-total { background: rgba(255, 255, 255, 0.03); color: #ffffff; border-color: rgba(255, 255, 255, 0.2); }

/* HISTORY */
.hist-card { background: #121212; border-radius: 18px; padding: 16px; margin-bottom: 12px; position: relative; border-left: 6px solid #7c68ff; }
.hist-label { color: #7c68ff; font-size: 11px; margin-right: 5px; opacity: 0.8; }
.st-icon { width: 24px; height: 24px; vertical-align: middle; margin-right: 8px; }
.win-trophy { fill: #3cff95; animation: trophy-bounce 1.5s infinite; }
.loss-x { fill: #ff3c3c; animation: loss-shake 0.5s infinite; }
.pending-text { animation: gold-glow 1.5s infinite; font-size: 14px; }

/* BUTTONS */
.copy-btn { position: absolute; right: 10px; top: 10px; background: rgba(124, 104, 255, 0.2); border: none; padding: 8px; border-radius: 10px; }
.copy-btn svg { width: 18px; fill: #7c68ff; }

/* NAV */
.nav { position: fixed; bottom: 0; width: 100%; background: #d7ccff; display: flex; justify-content: space-around; padding: 12px 0; border-top-left-radius: 25px; border-top-right-radius: 25px; z-index: 1000; }
.nav-item svg { width: 26px; height: 26px; fill: #6b5cff; }
.nav-item.active svg { fill: #3f2bff; transform: scale(1.1); }
</style>
</head>

<body>
<div id="toast">Copied</div>

<div id="home-screen" class="screen">
    <div class="header">
        <div class="avatar"></div>
        <div>MADARA VIP MOD<br><span style="font-size:10px; opacity:0.8;">ASURA V7 • PREMIUM UI</span></div>
    </div>
    <div class="container">
        <div class="compact-box"><div>PERIOD NO</div><div style="margin-left:auto; color:#7c68ff;" id="p-no">...</div></div>
        <div class="compact-box"><div>PREDICTION</div><div class="val-small" id="p-text">WAIT</div></div>
        <div class="compact-box"><div>NUMBER</div><div class="val-small" id="n-val">?</div></div>
        
        <div class="circles-line">
            <div class="prog-ring"><svg><circle class="bg-c" cx="27.5" cy="27.5" r="23"></circle><circle id="r-p" class="fg-c" cx="27.5" cy="27.5" r="23" stroke="#3cff95"></circle></svg><div class="ring-val" id="v-p">0</div></div>
            <div class="prog-ring"><svg><circle class="bg-c" cx="27.5" cy="27.5" r="23"></circle><circle id="r-f" class="fg-c" cx="27.5" cy="27.5" r="23" stroke="#ff3c3c"></circle></svg><div class="ring-val" id="v-f">0</div></div>
            <div class="prog-ring"><svg><circle class="bg-c" cx="27.5" cy="27.5" r="23"></circle><circle id="r-j" class="fg-c" cx="27.5" cy="27.5" r="23" stroke="#7c68ff"></circle></svg><div class="ring-val" id="v-j">0</div></div>
            <div class="prog-ring"><svg><circle class="bg-c" cx="27.5" cy="27.5" r="23"></circle><circle id="r-t" class="fg-c" cx="27.5" cy="27.5" r="23" stroke="#ffffff"></circle></svg><div class="ring-val" id="v-t">0</div></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card lab-win">WIN<span class="count" id="b-p">0</span></div>
            <div class="stat-card lab-loss">LOSS<span class="count" id="b-f">0</span></div>
            <div class="stat-card lab-jack">JACKPOT<span class="count" id="b-j">0</span></div>
            <div class="stat-card lab-total">TOTAL<span class="count" id="b-t">0</span></div>
        </div>
    </div>
</div>

<div id="game-screen" class="screen"><iframe src="https://www.jaiclub01.com/#/register?invitationCode=28262582138" style="width:100%; height:100%; border:none;"></iframe></div>

<div class="nav">
    <div class="nav-item active" onclick="tab('home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
    <div class="nav-item" onclick="tab('game')"><svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h3l2 3 2-3h4l2 3 2-3h3c1.1 0 2-.9 2-2V8z"/></svg></div>
    <div class="nav-item" onclick="tab('history')"><svg viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg></div>
</div>

<script>
let lastP = null, pendingEntry = null, s = { j:0, p:0, f:0, t:0 };

const SVGS = {
    win: `<svg class="st-icon win-trophy" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v3c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0 0 11 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 0 0 3.61-1.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>`,
    loss: `<svg class="st-icon loss-x" viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>`,
    copy: `<svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`
};

function calculateAsuraV7(history) {
    if (!history || history.length < 10) return { prediction: "SMALL", number: 7 };
    const types = history.map(h => parseInt(h.number) >= 5 ? "BIG" : "SMALL").reverse();
    let score = 0;
    
    // Markov logic
    let order2 = {};
    for (let i = 2; i < types.length; i++) {
        let state = types[i-2] + "_" + types[i-1];
        if (!order2[state]) order2[state] = { BIG: 0, SMALL: 0 };
        order2[state][types[i]]++;
    }
    let curState = types[types.length-2] + "_" + types[types.length-1];
    if (order2[curState]) {
        let b = order2[curState].BIG, sc = order2[curState].SMALL;
        if ((b + sc) > 0) score += ((sc - b) / (b + sc)) * 4;
    }

    let probSmall = 1 / (1 + Math.exp(-score));
    
    // INVERTED
    let pred = probSmall > 0.5 ? "BIG" : "SMALL";
    
    // OPPOSITE SET NUMBER
    const B = [5, 6, 7, 8, 9], S = [0, 1, 2, 3, 4];
    let n = (pred === "BIG") ? S[Math.floor(Math.random()*5)] : B[Math.floor(Math.random()*5)];

    return { prediction: pred, number: n };
}

window.copyToClip = (p, pr, n, st) => {
    const txt = `MADARA VIP MOD\n\nPERIOD NO :- ${p}\nPREDICTION:- ${pr}\nNUMBER :- ${n}\nSTATUS :- ${st}\nMOD OWNER :- @madarabhai98`;
    const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el); 
    const t = document.getElementById("toast"); t.innerText = "Copied!"; t.className = "show";
    setTimeout(() => { t.className = ""; }, 2000);
};

function updateUI(apiP, apiN, history) {
    if(pendingEntry && pendingEntry.fullP === apiP) {
        let actS = apiN >= 5 ? "BIG" : "SMALL";
        let status = "LOSS";
        if(pendingEntry.pN === apiN) { status = "JACKPOT"; s.j++; }
        else if(pendingEntry.pS === actS) { status = "WIN"; s.p++; }
        else { s.f++; }
        s.t++;
        
        ['p','f','j','t'].forEach(id => {
            const v = s[id], total = s.t;
            const circ = document.getElementById('r-' + id);
            circ.style.strokeDashoffset = 144.5 - (144.5 * (total === 0 ? 0 : v/total)) / 100;
            document.getElementById('v-' + id).innerText = v;
            document.getElementById('b-' + id).innerText = v;
        });
        
        const card = document.getElementById('card-' + pendingEntry.fullP);
        if(card) {
            const isWin = status !== "LOSS";
            card.style.borderLeftColor = (status === "JACKPOT") ? '#7c68ff' : (isWin ? '#3cff95' : '#ff3c3c');
            card.innerHTML = `<button class="copy-btn" onclick="copyToClip('${pendingEntry.fullP}','${pendingEntry.pS}','${pendingEntry.pN}','${status}')">${SVGS.copy}</button>
                <div><span class="hist-label">PRD:</span>${pendingEntry.fullP}</div>
                <div><span class="hist-label">PRED:</span>${pendingEntry.pS} | <span class="hist-label">NUM:</span>${pendingEntry.pN}</div>
                <div style="color:${status==='JACKPOT'?'#b39dff':(isWin?'#3cff95':'#ff3c3c')}; display:flex; align-items:center; margin-top:5px;">${isWin?SVGS.win:SVGS.loss} ${status}</div>`;
        }
    }
    
    const res = calculateAsuraV7(history);
    let nextP = (BigInt(apiP) + 1n).toString();
    let displayP = nextP.substring(0, 4) + "XXXXXXXX" + nextP.substring(nextP.length - 4);
    
    pendingEntry = { fullP: nextP, pS: res.prediction, pN: res.number };
    
    document.getElementById('p-no').innerText = displayP;
    document.getElementById('p-text').innerText = res.prediction;
    document.getElementById('n-val').innerText = res.number;

    const div = document.createElement('div');
    div.className = 'hist-card'; div.id = 'card-' + nextP;
    div.innerHTML = `<button class="copy-btn" onclick="copyToClip('${nextP}','${res.prediction}','${res.number}','PENDING')">${SVGS.copy}</button>
        <div><span class="hist-label">PRD:</span>${nextP}</div>
        <div><span class="hist-label">PRED:</span>${res.prediction} | <span class="hist-label">NUM:</span>${res.number}</div>
        <div class="pending-text">CALCULATING...</div>`;
    document.getElementById('history-list').prepend(div);
}

async function fetchAPI() {
    try {
        const r = await fetch(`https://draw.ar-lottery01.com/WinGo/WinGo_1M/GetHistoryIssuePage.json?ts=${Date.now()}`);
        const d = await r.json();
        if(d?.data?.list?.length > 0) {
            const L = d.data.list[0];
            if(L.issueNumber !== lastP) { updateUI(L.issueNumber, parseInt(L.number), d.data.list); lastP = L.issueNumber; }
        }
    } catch(e) {}
}

function tab(t) {
    document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
    document.getElementById(t + '-screen').style.display = 'block';
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    event.currentTarget.classList.add('active');
}

setInterval(fetchAPI, 3000); fetchAPI();
</script>
</body>
